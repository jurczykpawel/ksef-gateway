name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-api:
    name: Build & Test API (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/KSeFGateway.Api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Configure CIRFMF NuGet source
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/CIRFMF/index.json" \
            --name github-cirfmf \
            --username token \
            --password ${{ secrets.GITHUB_PAT }} \
            --store-password-in-clear-text

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test ../KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj -c Release --no-build --verbosity normal
        continue-on-error: true # Tests project has no tests yet

  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ksef-api
        run: |
          docker build \
            --build-arg GITHUB_PAT=${{ secrets.GITHUB_PAT }} \
            -f src/KSeFGateway.Api/Dockerfile \
            src/

      - name: Build ksef-pdf
        run: |
          docker build \
            -f pdf-service/Dockerfile \
            pdf-service/
