name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-api:
    name: Build & Test API (.NET)
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        env:
          GITHUB_PAT: ${{ secrets.CIRFMF_PAT }}
        run: dotnet restore KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj --configfile nuget.config

      - name: Build
        run: dotnet build KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj -c Release --no-build --verbosity normal --filter "Category!=Integration"

  build-docker:
    name: Build Docker images
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ksef-api
        run: |
          docker build \
            --build-arg GITHUB_PAT=${{ secrets.CIRFMF_PAT }} \
            -f src/KSeFGateway.Api/Dockerfile \
            src/

      - name: Build ksef-pdf
        run: |
          docker build \
            -f pdf-service/Dockerfile \
            pdf-service/
