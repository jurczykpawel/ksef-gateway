name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-api:
    name: Build & Test API (.NET)
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        env:
          GITHUB_PAT: ${{ secrets.CIRFMF_PAT }}
        run: dotnet restore KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj --configfile nuget.config

      - name: Build
        run: dotnet build KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj -c Release --no-restore

      - name: Unit tests
        run: dotnet test KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj -c Release --no-build --verbosity normal --filter "Category!=Integration"

  integration:
    name: Integration tests (unit + E2E vs live gateway)
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Start gateway
        env:
          GITHUB_PAT: ${{ secrets.CIRFMF_PAT }}
          KSEF_TOKEN: ${{ secrets.KSEF_TOKEN }}
          KSEF_NIP: ${{ secrets.KSEF_NIP }}
          KSEF_ENV: TEST
        run: docker compose up -d --build --quiet-pull

      - name: Wait for gateway
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then exit 0; fi
            sleep 2
          done
          echo "Gateway failed to start" && docker compose logs && exit 1

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        env:
          GITHUB_PAT: ${{ secrets.CIRFMF_PAT }}
        run: dotnet restore src/KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj --configfile src/nuget.config

      - name: All tests (unit + integration)
        env:
          KSEF_NIP: ${{ secrets.KSEF_NIP }}
          GATEWAY_URL: http://localhost:8080
        run: dotnet test src/KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj -c Release --no-restore --verbosity normal

  pdf-service:
    name: Build & Test PDF service (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pdf-service
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pdf-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: |
          OUT=$(npx tsc --noEmit --project tsconfig.json 2>&1 | grep -v "lib/" | grep -v "TS6059")
          echo "$OUT"
          ! echo "$OUT" | grep -q "error TS"

      - name: Unit tests
        run: npm test

  build-docker:
    name: Build Docker images
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build ksef-api
        run: |
          docker build \
            --build-arg GITHUB_PAT=${{ secrets.CIRFMF_PAT }} \
            -f src/KSeFGateway.Api/Dockerfile \
            src/

      - name: Build ksef-pdf
        run: |
          docker build \
            -f pdf-service/Dockerfile \
            pdf-service/
