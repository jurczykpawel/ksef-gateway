name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-api:
    name: Build & Test API (.NET)
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        env:
          GITHUB_PAT: ${{ secrets.CIRFMF_PAT }}
        run: dotnet restore KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj --configfile nuget.config

      - name: Build
        run: dotnet build KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj -c Release --no-restore

      - name: Unit tests
        run: dotnet test KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj -c Release --no-build --verbosity normal --filter "Category!=Integration"

  integration:
    name: Integration tests (unit + E2E vs live gateway)
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Start gateway
        env:
          GITHUB_PAT: ${{ secrets.CIRFMF_PAT }}
          GATEWAY_API_KEY: ci-test-key
          KSEF_TOKEN: ${{ secrets.KSEF_TOKEN }}
          KSEF_NIP: ${{ secrets.KSEF_NIP }}
          KSEF_ENV: TEST
        run: docker compose up -d --build --quiet-pull

      - name: Wait for gateway
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then exit 0; fi
            sleep 2
          done
          echo "Gateway failed to start" && docker compose logs && exit 1

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        env:
          GITHUB_PAT: ${{ secrets.CIRFMF_PAT }}
        run: dotnet restore src/KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj --configfile src/nuget.config

      - name: All tests (unit + integration)
        env:
          KSEF_NIP: ${{ secrets.KSEF_NIP }}
          GATEWAY_URL: http://localhost:8080
          GATEWAY_API_KEY: ci-test-key
        run: dotnet test src/KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj -c Release --no-restore --verbosity normal

  cert-auth-integration:
    name: Certificate auth integration test (file + content)
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build ksef-api image
        run: |
          docker build \
            --build-arg GITHUB_PAT=${{ secrets.CIRFMF_PAT }} \
            -f src/KSeFGateway.Api/Dockerfile \
            -t ksef-api-cert-test \
            src/

      - name: Generate + verify a self-signed test certificate
        env:
          GITHUB_PAT: ${{ secrets.CIRFMF_PAT }}
        run: docker compose --profile tools run --rm cert-generator

      - name: Start gateway authenticated with the certificate
        run: |
          NIP=$(cat output/test-cert.nip)
          echo "NIP=$NIP" >> "$GITHUB_ENV"
          docker run -d --name ksef-cert-test -p 8081:8080 \
            -e GATEWAY_API_KEY=ci-test-key \
            -e KSEF_ENV=TEST -e "KSEF_NIP=$NIP" \
            -e KSEF_CERT_PATH=/certs/test-cert.crt -e KSEF_KEY_PATH=/certs/test-cert.key \
            -v "$PWD/output/test-cert.crt:/certs/test-cert.crt:ro" \
            -v "$PWD/output/test-cert.key:/certs/test-cert.key:ro" \
            ksef-api-cert-test

      - name: Wait for gateway
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/health; then exit 0; fi
            sleep 2
          done
          echo "Gateway failed to start" && docker logs ksef-cert-test && exit 1

      - name: Verify certificate-based context is authenticated
        run: |
          for i in $(seq 1 15); do
            if curl -sf -H "X-Api-Key: ci-test-key" http://localhost:8081/ksef/status | tee status.json | grep -q '"authenticated":true'; then
              echo "Certificate auth OK (file path)"
              exit 0
            fi
            sleep 2
          done
          echo "Certificate auth did not complete in time"
          cat status.json 2>/dev/null
          docker logs ksef-cert-test
          exit 1

      - name: Start a second gateway authenticated with the certificate as content
        run: |
          docker run -d --name ksef-cert-content-test -p 8082:8080 \
            -e GATEWAY_API_KEY=ci-test-key \
            -e KSEF_ENV=TEST -e "KSEF_NIP=$NIP" \
            -e KSEF_CERT_CONTENT="$(cat output/test-cert.crt)" \
            -e KSEF_KEY_CONTENT="$(cat output/test-cert.key)" \
            ksef-api-cert-test

      - name: Wait for second gateway
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8082/health; then exit 0; fi
            sleep 2
          done
          echo "Gateway failed to start" && docker logs ksef-cert-content-test && exit 1

      - name: Verify certificate-content-based context is authenticated
        run: |
          for i in $(seq 1 15); do
            if curl -sf -H "X-Api-Key: ci-test-key" http://localhost:8082/ksef/status | tee status-content.json | grep -q '"authenticated":true'; then
              echo "Certificate auth OK (PEM content)"
              exit 0
            fi
            sleep 2
          done
          echo "Certificate-content auth did not complete in time"
          cat status-content.json 2>/dev/null
          docker logs ksef-cert-content-test
          exit 1

  build-docker:
    name: Build Docker images
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build ksef-api
        run: |
          docker build \
            --build-arg GITHUB_PAT=${{ secrets.CIRFMF_PAT }} \
            -f src/KSeFGateway.Api/Dockerfile \
            src/

      - name: Build ksef-pdf
        run: |
          docker build \
            -f pdf-service/Dockerfile \
            pdf-service/
