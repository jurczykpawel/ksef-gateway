name: KSeF Update Check

on:
  schedule:
    - cron: '0 9 * * 1'  # every Monday at 9:00 UTC
  workflow_dispatch:       # manual trigger

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check CIRFMF SDK releases
        id: sdk
        run: |
          # Get latest release from ksef-client-csharp
          LATEST=$(curl -sf https://api.github.com/repos/CIRFMF/ksef-client-csharp/releases/latest | jq -r '.tag_name // empty')
          echo "sdk_version=${LATEST}" >> "$GITHUB_OUTPUT"

          # Get latest commit on main
          LATEST_SHA=$(curl -sf https://api.github.com/repos/CIRFMF/ksef-client-csharp/commits/main | jq -r '.sha[:7]')
          echo "sdk_sha=${LATEST_SHA}" >> "$GITHUB_OUTPUT"

      - name: Check ksef-docs for schema changes
        id: docs
        run: |
          # Get latest commit date and message from ksef-docs
          RESPONSE=$(curl -sf "https://api.github.com/repos/CIRFMF/ksef-docs/commits?per_page=1")
          LATEST_DATE=$(echo "$RESPONSE" | jq -r '.[0].commit.committer.date // empty')
          LATEST_MSG=$(echo "$RESPONSE" | jq -r '.[0].commit.message // empty' | head -1)
          LATEST_SHA=$(echo "$RESPONSE" | jq -r '.[0].sha[:7] // empty')
          echo "docs_date=${LATEST_DATE}" >> "$GITHUB_OUTPUT"
          echo "docs_msg=${LATEST_MSG}" >> "$GITHUB_OUTPUT"
          echo "docs_sha=${LATEST_SHA}" >> "$GITHUB_OUTPUT"

      - name: Check for XSD changes in ksef-docs
        id: xsd
        run: |
          # Check recent commits touching XSD files
          XSD_COMMITS=$(curl -sf "https://api.github.com/repos/CIRFMF/ksef-docs/commits?path=.xsd&per_page=5" | jq -r '.[].commit.message' | head -5)
          if [ -n "$XSD_COMMITS" ]; then
            echo "xsd_changes<<EOF" >> "$GITHUB_OUTPUT"
            echo "$XSD_COMMITS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Check our stored versions
        id: current
        run: |
          # Read what we currently track
          if [ -f .github/ksef-versions.json ]; then
            CURRENT_SDK=$(jq -r '.sdk_sha // empty' .github/ksef-versions.json)
            CURRENT_DOCS=$(jq -r '.docs_sha // empty' .github/ksef-versions.json)
          else
            CURRENT_SDK=""
            CURRENT_DOCS=""
          fi
          echo "current_sdk=${CURRENT_SDK}" >> "$GITHUB_OUTPUT"
          echo "current_docs=${CURRENT_DOCS}" >> "$GITHUB_OUTPUT"

      - name: Compare and create issue if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SDK_SHA="${{ steps.sdk.outputs.sdk_sha }}"
          DOCS_SHA="${{ steps.docs.outputs.docs_sha }}"
          CURRENT_SDK="${{ steps.current.outputs.current_sdk }}"
          CURRENT_DOCS="${{ steps.current.outputs.current_docs }}"

          CHANGES=""

          if [ -n "$SDK_SHA" ] && [ "$SDK_SHA" != "$CURRENT_SDK" ]; then
            CHANGES="${CHANGES}\n### CIRFMF SDK (ksef-client-csharp)\n- Latest release: ${{ steps.sdk.outputs.sdk_version }}\n- Latest commit: ${SDK_SHA}\n- Our tracked: ${CURRENT_SDK:-none}\n- Repo: https://github.com/CIRFMF/ksef-client-csharp\n"
          fi

          if [ -n "$DOCS_SHA" ] && [ "$DOCS_SHA" != "$CURRENT_DOCS" ]; then
            CHANGES="${CHANGES}\n### KSeF Documentation (ksef-docs)\n- Latest commit: ${DOCS_SHA} (${{ steps.docs.outputs.docs_date }})\n- Message: ${{ steps.docs.outputs.docs_msg }}\n- Our tracked: ${CURRENT_DOCS:-none}\n- Repo: https://github.com/CIRFMF/ksef-docs\n"
          fi

          if [ -n "$CHANGES" ]; then
            # Check if similar issue already open
            EXISTING=$(gh issue list --label "ksef-update" --state open --json number --jq '.[0].number // empty')
            if [ -n "$EXISTING" ]; then
              echo "Issue #${EXISTING} already open, skipping"
              exit 0
            fi

            BODY=$(printf "Upstream KSeF changes detected. Review and update if needed.\n${CHANGES}\n## Action items\n- [ ] Check if SDK update affects our endpoints\n- [ ] Check if XSD schema changed (FA(3) structure)\n- [ ] Update dependencies if needed\n- [ ] Run integration tests against KSeF TEST\n\n*Auto-generated by ksef-update-check workflow*")

            gh issue create \
              --title "KSeF upstream update detected" \
              --body "$BODY" \
              --label "ksef-update"
          else
            echo "No changes detected"
          fi

      - name: Update tracked versions
        if: always()
        run: |
          mkdir -p .github
          cat > .github/ksef-versions.json << EOF
          {
            "sdk_sha": "${{ steps.sdk.outputs.sdk_sha }}",
            "sdk_version": "${{ steps.sdk.outputs.sdk_version }}",
            "docs_sha": "${{ steps.docs.outputs.docs_sha }}",
            "checked_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          if git diff --quiet .github/ksef-versions.json 2>/dev/null; then
            echo "No version changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/ksef-versions.json
            git commit -m "Update tracked KSeF upstream versions [skip ci]"
            git push
          fi
