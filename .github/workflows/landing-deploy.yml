name: Deploy Landing to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/landing-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: landing-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: landing
          command: pages deploy dist --project-name=ksef-gateway-landing --branch=${{ github.ref_name }}
