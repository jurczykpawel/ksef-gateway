repos:
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.88.24
    hooks:
      - id: trufflehog
        name: TruffleHog secret scan
        entry: trufflehog git file://. --since-commit HEAD --results verified,unknown --fail
        language: golang
        pass_filenames: false
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: pdf-typecheck
        name: PDF service typecheck
        entry: bash -c 'cd pdf-service && OUT=$(npx tsc --noEmit --project tsconfig.json 2>&1 | grep -v "lib/" | grep -v "TS6059"); echo "$OUT"; ! echo "$OUT" | grep -q "error TS"'
        language: system
        pass_filenames: false
        files: ^pdf-service/src/

      - id: pdf-test
        name: PDF service tests
        entry: bash -c 'cd pdf-service && npm test'
        language: system
        pass_filenames: false
        files: ^pdf-service/

      - id: dotnet-build
        name: .NET build check
        entry: bash -c 'which dotnet > /dev/null 2>&1 || exit 0; cd src && dotnet build KSeFGateway.Api/KSeFGateway.Api.csproj --no-restore -q'
        language: system
        pass_filenames: false
        files: ^src/.*\.cs$

      - id: dotnet-test
        name: .NET unit tests
        entry: bash -c 'which dotnet > /dev/null 2>&1 || exit 0; cd src && dotnet test KSeFGateway.Api.Tests/KSeFGateway.Api.Tests.csproj --no-restore --no-build --filter "Category!=Integration" -q'
        language: system
        pass_filenames: false
        files: ^src/.*\.cs$

      - id: integration-tests
        name: Integration tests (unit + E2E vs live gateway)
        entry: bash -c 'scripts/test-full.sh'
        language: system
        pass_filenames: false
        stages: [pre-push]
