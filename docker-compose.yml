services:
  ksef-api:
    build:
      context: ./src
      dockerfile: KSeFGateway.Api/Dockerfile
      args:
        GITHUB_PAT: ${GITHUB_PAT}
    ports:
      - "${KSEF_API_PORT:-8080}:8080"
    environment:
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
      - KSEF_TOKEN=${KSEF_TOKEN}
      - KSEF_NIP=${KSEF_NIP}
      - KSEF_ENV=${KSEF_ENV:-TEST}
      - PDF_SERVICE_URL=http://ksef-pdf:3000
      - KSEF_CONTEXTS_FILE=/app/contexts.json
      # Certificate-based auth (alternative to KSEF_TOKEN) - see README "Certificate-Based Auth"
      - KSEF_CERT_PATH=${KSEF_CERT_PATH:-}
      - KSEF_KEY_PATH=${KSEF_KEY_PATH:-}
      - KSEF_KEY_PASSWORD=${KSEF_KEY_PASSWORD:-}
    volumes:
      - ./contexts.json:/app/contexts.json:ro
      # Mount your cert/key files here if using certificate-based auth (single-NIP or via contexts.json)
      # - ./certs:/app/certs:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      ksef-pdf:
        condition: service_healthy
    restart: unless-stopped

  ksef-pdf:
    build:
      context: ./pdf-service
      dockerfile: Dockerfile
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-off: runs .NET unit tests inside Docker (no local SDK required)
  # Usage: docker compose run --rm ksef-api-tests
  ksef-api-tests:
    build:
      context: ./src
      dockerfile: KSeFGateway.Api/Dockerfile
      target: test
      args:
        GITHUB_PAT: ${GITHUB_PAT}
    profiles: ["tools"]

  # One-off tool: generates KSeF token on TEST environment
  # Usage: docker compose run --rm token-generator
  token-generator:
    build:
      context: ./tools/TokenGenerator
      args:
        GITHUB_PAT: ${GITHUB_PAT}
    profiles: ["tools"]

  # One-off tool: generates + verifies a self-signed KSeF certificate on TEST environment
  # Usage: docker compose run --rm cert-generator
  cert-generator:
    build:
      context: ./tools/CertGenerator
      args:
        GITHUB_PAT: ${GITHUB_PAT}
    volumes:
      - ./output:/app/output
    profiles: ["tools"]

  # One-off tool: authenticates, sends an invoice, downloads it back
  # Usage: docker compose run --rm invoice-demo
  invoice-demo:
    build:
      context: ./tools/InvoiceDemo
      args:
        GITHUB_PAT: ${GITHUB_PAT}
    volumes:
      - ./output:/app/output
    profiles: ["tools"]
