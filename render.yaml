services:
  - type: web
    name: ksef-api
    runtime: docker
    dockerfilePath: src/KSeFGateway.Api/Dockerfile
    dockerContext: src
    plan: free
    healthCheckPath: /health
    envVars:
      # Required - the gateway has no other caller-facing auth, see README "Security".
      # Generate with: openssl rand -hex 32
      - key: GATEWAY_API_KEY
        sync: false
      # Optional defense-in-depth: only accept traffic forwarded by your proxy (e.g. Cloudflare).
      # Set this + inject the same value as a header in the proxy (default X-Trusted-Proxy-Secret)
      # so a direct hit on this service's public *.onrender.com URL is rejected. See README "Security".
      - key: TRUSTED_PROXY_SECRET
        sync: false
      - key: TRUSTED_PROXY_HEADER
        sync: false
      # Leave KSEF_TOKEN blank and use KSEF_CERT_PATH/KSEF_KEY_PATH instead if you'd
      # rather authenticate with a certificate: upload the .crt/.key as Secret Files
      # (dashboard: Environment -> Secret Files), they land at /etc/secrets/<filename>.
      - key: KSEF_TOKEN
        sync: false
      - key: KSEF_CERT_PATH
        sync: false
      - key: KSEF_KEY_PATH
        sync: false
      - key: KSEF_KEY_PASSWORD
        sync: false
      - key: KSEF_NIP
        sync: false
      - key: KSEF_ENV
        value: TEST
      - key: PDF_SERVICE_URL
        fromService:
          name: ksef-pdf
          type: web
          property: hostport
      - key: GITHUB_PAT
        sync: false
      - key: DOCKER_BUILDKIT
        value: "1"
    buildFilter:
      paths:
        - src/**

  - type: web
    name: ksef-pdf
    runtime: docker
    dockerfilePath: pdf-service/Dockerfile
    dockerContext: pdf-service
    plan: free
    healthCheckPath: /health
    buildFilter:
      paths:
        - pdf-service/**
